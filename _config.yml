theme: jekyll-theme-cayman
title: Claude Code Setup
description: Global Claude Code configuration with rules, hooks, agents, and governance docs.
url: https://stuartshields.github.io
baseurl: /claude-setup
lang: en-GB
author: Stuart Shields

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

exclude:
  - ".claude/"
  - ".planning/"
  - ".playwright-mcp/"
  - "CLAUDE.md"
  - "CHANGELOG.md"
  - "docs/governance-review-template.md"
  - "docs/governance/"
  - "README.md"
  - "CONTRIBUTING.md"
social: { name: "Stuart Shields", links: ["https://github.com/stuartshields"] }
